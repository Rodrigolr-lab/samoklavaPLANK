meta:
  engine: 4.0.4
  name: alpha_plank_unibody_choc
  author: you
  version: 0.1

units:
  # Outline tuning
  board_expand: 3          # mm
  board_fillet: 2          # mm
  key_rect: u - 1          # mm
  plate_cutout: 14         # mm
  plate_cutout_corner: 0.5 # mm

  # Case tuning
  case_wall: 2.2           # mm
  case_clearance: 0.4      # mm
  case_floor: 2.0          # mm
  case_height: 12          # mm

points:
  key:
    tags:
      - key
    autobind: 12

  mirror:
    ref: ortho_inner_home
    distance: 1U

  zones:
    ortho:
      columns:
        pinky:
          key:
            column_net: col_pinky
        ring:
          key:
            column_net: col_ring
        middle:
          key:
            column_net: col_middle
        index:
          key:
            column_net: col_index
        inner:
          key:
            column_net: col_inner
      rows:
        home:
          padding: 1U
          key:
            row_net: row_home
        top:
          padding: 1U
          key:
            row_net: row_top

    stagger:
      anchor:
        ref: ortho_pinky_home
        shift: [0.5U, -1U]
      columns:
        pinky:
          key:
            column_net: col_pinky
        ring:
          key:
            column_net: col_ring
        middle:
          key:
            column_net: col_middle
        index:
          key:
            asym: left
            column_net: col_index
        space:
          key:
            spread: 0.5U
            asym: right
            width: 2*(u-1)
            column_net: col_space
      rows:
        bottom:
          padding: 1U
          key:
            row_net: row_bottom

outlines:
  # Raw bound outline made from rectangles at each point
  _raw:
    - what: rectangle
      where: true
      size: [key_rect, key_rect]
      bound: true

  # Optional preview
  keycaps:
    - what: rectangle
      where: true
      size: [u, u]

  # Final PCB edge
  board:
    - what: outline
      name: _raw
      expand: board_expand)
      fillet: board_fillet

  # Switch cutouts (for plate)
  _switch_cutouts:
    - what: rectangle
      where: true
      size: [plate_cutout, plate_cutout]
      corner: plate_cutout_corner

  # Plate = board minus switch cutouts
  plate:
    - board
    - -_switch_cutouts

  # Case helper: inner outline (contracted board)
  _case_inner:
    - what: outline
      name: board
      expand: -(case_wall + case_clearance))
      fillet: board_fillet

cases:
  # Bottom tray: outer shell minus lifted cavity (leaves floor thickness)
  bottom:
    - what: outline
      name: board
      extrude: case_height
      operation: add

    - what: outline
      name: _case_inner
      extrude: case_height
      shift: [0, 0, case_floor]
      operation: subtract

pcbs:
  alpha_plank_unibody_choc:
    template: kicad5
    references: false

    outlines:
      - outline: board
        layer: Edge.Cuts

    footprints:
      - where: true
        what: choc
        params:
          keycaps: false
          reverse: false
          hotswap: false
          from: "{{column_net}}"
          to: "{{name}}"

      - where: true
        what: diode
        adjust:
          shift: [0, -5]
        params:
          from: "{{name}}"
          to: "{{row_net}}"

